name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  ci:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      # Keys dummy de Clerk: build/e2e solo necesitan que existan; ningún test
      # llama a la API de Clerk (el mapeo user→tenant se testea contra Postgres).
      NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: pk_test_Y2xlcmsuZXhhbXBsZS5jb20k
      CLERK_SECRET_KEY: sk_test_dummy_ci_only
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Skills anti-drift
        run: scripts/sync-skills.sh --check

      - name: OpenSpec validate
        run: npx --yes @fission-ai/openspec@latest validate --all --strict

      - name: Typecheck
        run: npm run typecheck

      - name: Lint (incluye límites de módulos)
        run: npm run lint

      - name: Format check
        run: npm run format:check

      - name: Unit & integration tests (Vitest)
        run: npm run test

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: E2E tests (Playwright)
        run: npm run test:e2e

      - name: Build
        run: npm run build

      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
